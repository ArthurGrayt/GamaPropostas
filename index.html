<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gama Propostas | Gestão de Propostas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            "charcoal": "#334155",
            "dusty-berry": "#A65D7B",
            "forest-sage": "#5F7A61",
            "warm-ochre": "#C48E4D",
            "soft-sapphire": "#527DA3",
            "sunrise-coral": "#118b89",
            "royal-glass": "rgba(65, 105, 225, 0.4)",
            "pearl-white": "#FDFDFD",
            "background-light": "#F8FAFC",
            "background-dark": "#0F172A"
          },
          fontFamily: {
            display: "Inter",
            body: ["Inter", "sans-serif"],
            sans: ['Inter', 'sans-serif'],
          },
          boxShadow: {
            "soft-glow": "0 4px 14px 0 rgba(17, 139, 137, 0.39)",
            "glass-card-light": "0 8px 32px 0 rgba(31, 38, 135, 0.05)",
            "inner-glow": "inset 0 0 12px rgba(255, 255, 255, 0.4), 0 4px 12px rgba(0, 0, 0, 0.05)",
            "sphere": "inset -10px -10px 20px rgba(0,0,0,0.1), inset 10px 10px 20px rgba(255,255,255,0.4), 0 15px 25px rgba(65, 105, 225, 0.2)"
          },
          borderRadius: {
            DEFAULT: "1rem",
            lg: "2rem",
            xl: "3rem",
            full: "9999px"
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            scaleIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            backdropFadeIn: {
              'from': { opacity: '0' },
              'to': { opacity: '1' },
            },
            cartSlideIn: {
              'from': { transform: 'translateX(100%)' },
              'to': { transform: 'translateX(0)' },
            }
          },
          animation: {
            'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.3s ease-out forwards',
            'scale-in': 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'backdrop-fade-in': 'backdropFadeIn 0.3s ease-out forwards',
            'cart-slide-in': 'cartSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          transitionTimingFunction: {
            'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.275)',
            'spring-bouncy': 'cubic-bezier(0.34, 1.56, 0.64, 1)',
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.2);
      border-radius: 4px;
    }

    .glass-panel {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .sphere-reflection {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 50%);
    }

    body {
      background-color: #F8FAFC;
    }

    html.dark body {
      background-color: #0F172A;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "tailwind-merge": "https://aistudiocdn.com/tailwind-merge@^3.4.0",
    "clsx": "https://aistudiocdn.com/clsx@^2.1.1",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
    "jspdf": "https://aistudiocdn.com/jspdf@^2.5.1",
    "jspdf-autotable": "https://aistudiocdn.com/jspdf-autotable@^3.8.2"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-stone-50 dark:bg-[#050505] transition-colors duration-500">
  <div id="root" class="relative z-10"></div>
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div
      class="absolute -top-[10%] -left-[10%] w-[60vw] h-[60vw] bg-slate-100/40 rounded-full blur-[120px] dark:hidden block">
    </div>
    <div
      class="absolute top-[30%] -right-[10%] w-[50vw] h-[50vw] bg-blue-50/30 rounded-full blur-[100px] dark:hidden block">
    </div>
    <div
      class="absolute -bottom-[10%] -left-[10%] w-[40vw] h-[40vw] bg-indigo-50/20 rounded-full blur-[100px] dark:hidden block">
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
